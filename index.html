<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokyo Trip 2026 - Travel Planner</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: #000;
            color: #fff;
            padding: 60px 20px;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 400px;
            height: 100%;
            background: linear-gradient(135deg, #2a2a2a 0%, #000 100%);
            clip-path: polygon(100% 0, 0 0, 100% 100%);
        }

        header .content {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header h1 {
            font-size: 3.5em;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        header .subtitle {
            font-size: 1.1em;
            font-weight: 300;
            letter-spacing: 2px;
            color: #ccc;
            margin-bottom: 40px;
        }

        header .trip-info {
            display: flex;
            gap: 60px;
            flex-wrap: wrap;
        }

        header .info-item {
            position: relative;
            padding-left: 0;
        }

        header .info-item .label {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #999;
            margin-bottom: 8px;
        }

        header .info-item .value {
            font-size: 1.8em;
            font-weight: 700;
            color: #fff;
        }

        /* Expense Summary */
        .expense-summary {
            background: #fff;
            padding: 50px 40px;
            margin: -40px 20px 40px;
            position: relative;
            z-index: 10;
            border-left: 8px solid #000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .expense-summary h2 {
            font-size: 1.3em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #000;
        }

        .expense-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .expense-card {
            background: #f9f9f9;
            padding: 25px;
            border: 1px solid #e0e0e0;
            position: relative;
            overflow: hidden;
        }

        .expense-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: #000;
        }

        .expense-card .label {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            margin-bottom: 12px;
        }

        .expense-card .value {
            font-size: 1.8em;
            font-weight: 700;
            color: #000;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 40px;
            border-bottom: 2px solid #e0e0e0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 20px 30px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            position: relative;
            transition: color 0.3s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab-btn:hover {
            color: #000;
        }

        .tab-btn.active {
            color: #000;
            border-bottom-color: #000;
        }

        /* Tab Content */
        .tab-content {
            display: none;
            animation: slideIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Itinerary Grid */
        .itinerary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .day-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .day-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: #000;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .day-card:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            transform: translateY(-4px);
        }

        .day-card:hover::before {
            transform: scaleX(1);
        }

        .day-card-header {
            background: #f9f9f9;
            padding: 25px;
            border-bottom: 1px solid #e0e0e0;
            position: relative;
        }

        .day-card h3 {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .day-card .date {
            font-size: 0.85em;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .day-card .location {
            font-size: 1em;
            font-weight: 600;
            color: #000;
        }

        .day-card .edit-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #000;
            border: none;
            color: #fff;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .day-card .edit-btn:hover {
            background: #333;
        }

        .day-details {
            display: none;
            padding: 25px;
            background: #fff;
        }

        .day-details.show {
            display: block;
        }

        .accommodation-section {
            margin-bottom: 25px;
            padding: 20px;
            background: #f9f9f9;
            border-left: 4px solid #000;
        }

        .accommodation-section h4 {
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #000;
        }

        .accommodation-info {
            font-size: 0.95em;
            color: #333;
            line-height: 1.6;
        }

        .meal-section {
            margin-bottom: 25px;
        }

        .meal-section h4 {
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #000;
        }

        .meal-option {
            margin-bottom: 12px;
            padding: 12px;
            background: #f9f9f9;
            border-left: 3px solid #ddd;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .meal-option:hover {
            border-left-color: #000;
            background: #f0f0f0;
        }

        .meal-option input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .meal-option label {
            flex: 1;
            cursor: pointer;
            margin: 0;
            font-size: 0.95em;
        }

        .meal-option .details {
            font-size: 0.85em;
            color: #999;
        }

        .activity {
            margin-bottom: 18px;
            padding: 15px;
            background: #f9f9f9;
            border-left: 3px solid #ddd;
            transition: all 0.3s ease;
        }

        .activity:hover {
            border-left-color: #000;
            background: #f0f0f0;
        }

        .activity-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            gap: 10px;
        }

        .activity-type {
            font-weight: 700;
            font-size: 0.95em;
            color: #000;
        }

        .activity-time {
            font-size: 0.8em;
            background: #000;
            color: #fff;
            padding: 4px 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            white-space: nowrap;
        }

        .activity-details {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 6px;
        }

        .activity-remarks {
            font-size: 0.85em;
            color: #999;
            font-style: italic;
            margin-bottom: 8px;
        }

        .activity-maps {
            margin-top: 10px;
        }

        .activity-maps a {
            display: inline-block;
            background: #000;
            color: #fff;
            padding: 6px 12px;
            text-decoration: none;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .activity-maps a:hover {
            background: #333;
        }

        /* Recommendations */
        .recommendations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .rec-card {
            background: #fff;
            padding: 0;
            border: 1px solid #e0e0e0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .rec-card:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            transform: translateY(-4px);
        }

        .rec-card-header {
            background: #f9f9f9;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .rec-card h4 {
            color: #000;
            margin-bottom: 10px;
            font-size: 1.1em;
            font-weight: 700;
        }

        .rec-card .category {
            display: inline-block;
            background: #000;
            color: #fff;
            padding: 4px 12px;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .rec-card-body {
            padding: 20px;
        }

        .rec-card p {
            color: #666;
            font-size: 0.95em;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .rec-card .rating {
            color: #000;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .rec-card a {
            color: #000;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #000;
            transition: all 0.3s ease;
        }

        .rec-card a:hover {
            border-bottom-color: #666;
            color: #666;
        }

        /* Buttons */
        .btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-right: 10px;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85em;
        }

        .btn:hover {
            background: #333;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #000;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.8em;
            margin: 5px 5px 5px 0;
        }

        /* Forms */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #000;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            background: #f9f9f9;
            font-family: inherit;
            font-size: 1em;
            color: #000;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #000;
            background: #fff;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #fff;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 25px;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 20px;
            border-bottom: 2px solid #000;
        }

        /* Expense Item */
        .expense-item {
            background: #f9f9f9;
            padding: 20px;
            border-left: 4px solid #000;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            border-left: 4px solid #000;
        }

        .expense-item h4 {
            margin-bottom: 10px;
            color: #000;
            font-weight: 700;
        }

        .expense-item p {
            margin: 6px 0;
            color: #666;
            font-size: 0.95em;
        }

        /* Split Table */
        .split-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        .split-table th,
        .split-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .split-table th {
            background: #f0f0f0;
            font-weight: 700;
            color: #000;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }

        .split-table tr:hover {
            background: #f9f9f9;
        }

        /* Person Tag */
        .person-tag {
            display: inline-block;
            background: #000;
            color: #fff;
            padding: 8px 16px;
            margin: 5px 5px 5px 0;
            font-size: 0.9em;
            font-weight: 600;
        }

        .person-tag .remove {
            margin-left: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Footer */
        footer {
            text-align: center;
            color: #999;
            margin-top: 60px;
            padding: 40px 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2.2em;
            }

            header .trip-info {
                gap: 30px;
            }

            .itinerary-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                justify-content: flex-start;
                overflow-x: auto;
            }

            .tab-btn {
                padding: 15px 20px;
                font-size: 0.85em;
            }

            .expense-summary {
                margin: -20px 0 30px;
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="content">
                <h1>TOKYO TRIP</h1>
                <p class="subtitle">2026 TRAVEL PLANNER</p>
                <div class="trip-info">
                    <div class="info-item">
                        <div class="label">Duration</div>
                        <div class="value">6 Days</div>
                    </div>
                    <div class="info-item">
                        <div class="label">Dates</div>
                        <div class="value">Apr 15-20, 2026</div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Trip Expense Summary -->
        <div class="expense-summary">
            <h2>TRIP EXPENSE OVERVIEW</h2>
            <div class="expense-cards">
                <div class="expense-card">
                    <div class="label">Total Expenses</div>
                    <div class="value" id="totalExpenses">¥0</div>
                </div>
                <div class="expense-card">
                    <div class="label">Number of Expenses</div>
                    <div class="value" id="expenseCount">0</div>
                </div>
                <div class="expense-card">
                    <div class="label">Per Person Average</div>
                    <div class="value" id="avgPerPerson">¥0</div>
                </div>
                <div class="expense-card">
                    <div class="label">Highest Category</div>
                    <div class="value" id="highestCategory">-</div>
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('itinerary')">ITINERARY</button>
            <button class="tab-btn" onclick="switchTab('expenses')">EXPENSES</button>
            <button class="tab-btn" onclick="switchTab('recommendations')">RECOMMENDATIONS</button>
        </div>

        <!-- Itinerary Tab -->
        <div id="itinerary" class="tab-content active">
            <div class="itinerary-grid" id="itineraryGrid"></div>
        </div>

        <!-- Expenses Tab -->
        <div id="expenses" class="tab-content">
            <div style="background: #fff; padding: 40px; border: 1px solid #e0e0e0; margin-bottom: 30px;">
                <h3 style="margin-bottom: 25px; color: #000; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">TRIP MEMBERS</h3>
                <div id="personsList" style="margin-bottom: 20px;"></div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="newPersonName" placeholder="Enter person name" style="flex: 1; padding: 12px; border: 1px solid #ddd; background: #f9f9f9;">
                    <button class="btn" onclick="addPerson()">ADD</button>
                </div>
            </div>

            <button class="btn" onclick="openAddExpenseModal()">ADD EXPENSE</button>
            <div id="expensesList" style="margin-top: 30px;"></div>
            <div id="splitSummary"></div>
        </div>

        <!-- Recommendations Tab -->
        <div id="recommendations" class="tab-content">
            <div style="margin-bottom: 30px;">
                <button class="btn" onclick="openAddRecommendationModal()">ADD RECOMMENDATION</button>
                <button class="btn btn-secondary" onclick="openEditRecommendationModal()">EDIT RECOMMENDATIONS</button>
            </div>
            <div class="recommendations-grid" id="recommendationsGrid"></div>
        </div>

        <footer>
            <p>TOKYO TRIP 2026 | TRAVEL PLANNER</p>
        </footer>
    </div>

    <!-- Modals -->
    <div id="editDayModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">EDIT DAY DETAILS</div>
            <div id="editDayForm"></div>
            <button class="btn" onclick="saveDayEdits()">SAVE</button>
            <button class="btn btn-secondary" onclick="closeModal('editDayModal')">CANCEL</button>
        </div>
    </div>

    <div id="addExpenseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">ADD EXPENSE</div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="expenseDesc" placeholder="e.g., Dinner at restaurant">
            </div>
            <div class="form-group">
                <label>Currency</label>
                <select id="expenseCurrency">
                    <option value="JPY">JPY (Japanese Yen)</option>
                    <option value="HKD">HKD (Hong Kong Dollar)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Amount</label>
                <input type="number" id="expenseAmount" placeholder="0" min="0">
            </div>
            <div class="form-group">
                <label>Paid By</label>
                <select id="expensePaidBy"></select>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="expenseCategory">
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Accommodation">Accommodation</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Split Type</label>
                <select id="expenseSplitType" onchange="updateSplitOptions()">
                    <option value="equal">Equal Split</option>
                    <option value="parts">By Parts (Percentages)</option>
                    <option value="amount">By Amount</option>
                </select>
            </div>
            <div id="splitOptionsContainer"></div>
            <button class="btn" onclick="addExpense()">ADD</button>
            <button class="btn btn-secondary" onclick="closeModal('addExpenseModal')">CANCEL</button>
        </div>
    </div>

    <div id="addRecommendationModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">ADD RECOMMENDATION</div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="recName" placeholder="Restaurant or attraction name">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="recCategory">
                    <option value="Food">Food</option>
                    <option value="Attraction">Attraction</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Car-related">Car-related</option>
                    <option value="Entertainment">Entertainment</option>
                </select>
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="recLocation" placeholder="e.g., Shinjuku, Tokyo">
            </div>
            <div class="form-group">
                <label>Details</label>
                <textarea id="recDetails" placeholder="Description of the place"></textarea>
            </div>
            <div class="form-group">
                <label>Google Maps Link</label>
                <input type="url" id="recMapLink" placeholder="https://maps.google.com/...">
            </div>
            <div class="form-group">
                <label>Rating (1-5)</label>
                <input type="number" id="recRating" placeholder="4.5" min="1" max="5" step="0.1">
            </div>
            <button class="btn" onclick="addRecommendation()">ADD</button>
            <button class="btn btn-secondary" onclick="closeModal('addRecommendationModal')">CANCEL</button>
        </div>
    </div>

    <div id="editRecommendationModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">EDIT RECOMMENDATIONS</div>
            <div id="editRecommendationForm"></div>
            <button class="btn" onclick="saveRecommendations()">SAVE</button>
            <button class="btn btn-secondary" onclick="closeModal('editRecommendationModal')">CANCEL</button>
        </div>
    </div>

    <script>
        // Initialize data from localStorage

                        <p><strong>Category:</strong> ${exp.category}</p>
                        <p><strong>Split Type:</strong> ${exp.splitType === 'equal' ? 'Equal' : exp.splitType === 'parts' ? 'By Parts' : 'By Amount'}</p>

                    </div>
                `).join('');
            }

            calculateSplits();
        }

        function calculateSplits() {
            const summary = document.getElementById('splitSummary');
            if (expenses.length === 0) {
                summary.innerHTML = '';
                return;
            }

            const balances = {};
            persons.forEach(p => balances[p] = 0);

            expenses.forEach(exp => {
                let splits = {};
                
                if (exp.splitType === 'equal') {
                    const perPerson = exp.amount / persons.length;
                    persons.forEach(p => splits[p] = perPerson);
                } else if (exp.splitType === 'parts') {
                    const totalParts = Object.values(exp.splitDetails).reduce((a, b) => a + b, 0);
                    persons.forEach(p => {
                        splits[p] = (exp.splitDetails[p] || 0) / totalParts * exp.amount;
                    });
                } else if (exp.splitType === 'amount') {
                    splits = exp.splitDetails;
                }

                // Payer receives the full amount
                balances[exp.paidBy] += exp.amount;
                // Each person (including payer) owes their share
                persons.forEach(p => {
                    balances[p] -= splits[p];
                });
            });

            let splitHTML = `
                <div style="margin-top: 40px; background: #fff; padding: 40px; border: 1px solid #e0e0e0; border-left: 4px solid #000;">
                    <h3 style="margin-bottom: 25px; color: #000; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">EXPENSE SETTLEMENT</h3>
                    <table class="split-table">
                        <thead>
                            <tr>
                                <th>PERSON</th>
                                <th>STATUS</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            persons.forEach(person => {
                const balance = balances[person];
                let status = '';
                if (Math.abs(balance) < 0.01) {
                    status = '✓ SETTLED';
                } else if (balance > 0) {
                    status = `OWED HK$${(Math.abs(balance) * 0.05).toLocaleString('en-US', {maximumFractionDigits: 0})}`;
                } else {
                    status = `OWES HK$${(Math.abs(balance) * 0.05).toLocaleString('en-US', {maximumFractionDigits: 0})}`;
                }
                splitHTML += `
                    <tr>
                        <td>${person}</td>
                        <td>${status}</td>
                    </tr>
                `;
            });

            splitHTML += `
                        </tbody>
                    </table>
                </div>
            `;

            summary.innerHTML = splitHTML;
        }

        function updateSplitOptions() {
            const splitType = document.getElementById('expenseSplitType').value;
            const container = document.getElementById('splitOptionsContainer');
            
            if (splitType === 'equal') {
                container.innerHTML = '<p style="color: #666; font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.5px;">Expense will be split equally among all members.</p>';
            } else if (splitType === 'parts') {
                container.innerHTML = `
                    <div style="background: #f9f9f9; padding: 15px; border-left: 3px solid #ddd; margin-top: 15px;">
                        <p style="margin-bottom: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Enter percentage for each person:</p>
                        ${persons.map(p => `
                            <div class="form-group">
                                <label>${p} (%)</label>
                                <input type="number" id="part_${p}" placeholder="0" min="0" max="100" value="0">
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (splitType === 'amount') {
                container.innerHTML = `
                    <div style="background: #f9f9f9; padding: 15px; border-left: 3px solid #ddd; margin-top: 15px;">
                        <p style="margin-bottom: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Enter amount for each person:</p>
                        ${persons.map(p => `
                            <div class="form-group">
                                <label>${p} (¥)</label>
                                <input type="number" id="amount_${p}" placeholder="0" min="0" value="0">
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        }

        function addExpense() {
            const desc = document.getElementById('expenseDesc').value;
            const currency = document.getElementById('expenseCurrency').value;
            const amount = parseFloat(document.getElementById('expenseAmount').value);
            const paidBy = document.getElementById('expensePaidBy').value;
            const category = document.getElementById('expenseCategory').value;
            const splitType = document.getElementById('expenseSplitType').value;

            if (!desc || !amount || amount <= 0) {
                alert('Please fill in all fields correctly');
                return;
            }

            let splitDetails = {};
            if (splitType === 'equal') {
                persons.forEach(p => splitDetails[p] = 1);
            } else if (splitType === 'parts') {
                persons.forEach(p => {
                    splitDetails[p] = parseFloat(document.getElementById(`part_${p}`).value) || 0;
                });
                if (Object.values(splitDetails).reduce((a, b) => a + b, 0) === 0) {
                    alert('Please enter at least one percentage');
                    return;
                }
            } else if (splitType === 'amount') {
                persons.forEach(p => {
                    splitDetails[p] = parseFloat(document.getElementById(`amount_${p}`).value) || 0;
                });
                if (Object.values(splitDetails).reduce((a, b) => a + b, 0) === 0) {
                    alert('Please enter at least one amount');
                    return;
                }
            }

            expenses.push({ description: desc, amount, currency, paidBy, category, splitType, splitDetails });
            localStorage.setItem('expenses', JSON.stringify(expenses));

            document.getElementById('expenseDesc').value = '';
            document.getElementById('expenseAmount').value = '';
            closeModal('addExpenseModal');
            renderExpenses();
            updateExpenseSummary();
        }

        function deleteExpense(idx) {
            expenses.splice(idx, 1);
            localStorage.setItem('expenses', JSON.stringify(expenses));
            renderExpenses();
            updateExpenseSummary();
        }

        function openAddRecommendationModal() {
            document.getElementById('addRecommendationModal').classList.add('show');
        }

        function addRecommendation() {
            const name = document.getElementById('recName').value;
            const category = document.getElementById('recCategory').value;
            const location = document.getElementById('recLocation').value;
            const details = document.getElementById('recDetails').value;
            const mapLink = document.getElementById('recMapLink').value;
            const rating = parseFloat(document.getElementById('recRating').value) || 4.0;

            if (!name || !location) {
                alert('Please fill in name and location');
                return;
            }

            recommendations.push({ name, category, location, details, mapLink, rating });
            localStorage.setItem('recommendations', JSON.stringify(recommendations));

            document.getElementById('recName').value = '';
            document.getElementById('recDetails').value = '';
            document.getElementById('recMapLink').value = '';
            document.getElementById('recRating').value = '';
            closeModal('addRecommendationModal');
            renderRecommendations();
        }

        function openEditRecommendationModal() {
            const form = document.getElementById('editRecommendationForm');
            form.innerHTML = recommendations.map((rec, idx) => `
                <div style="margin-bottom: 25px; padding: 20px; background: #f9f9f9; border-left: 3px solid #ddd;">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" value="${rec.name}" onchange="recommendations[${idx}].name = this.value">
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" value="${rec.location}" onchange="recommendations[${idx}].location = this.value">
                    </div>
                    <div class="form-group">
                        <label>Details</label>
                        <textarea onchange="recommendations[${idx}].details = this.value">${rec.details}</textarea>
                    </div>
                    <div class="form-group">
                        <label>Google Maps Link</label>
                        <input type="url" value="${rec.mapLink || ''}" onchange="recommendations[${idx}].mapLink = this.value">
                    </div>
                    <button class="btn btn-secondary btn-small" onclick="recommendations.splice(${idx}, 1); openEditRecommendationModal();">DELETE</button>
                </div>
            `).join('');
            document.getElementById('editRecommendationModal').classList.add('show');
        }

        function saveRecommendations() {
            localStorage.setItem('recommendations', JSON.stringify(recommendations));
            closeModal('editRecommendationModal');
            renderRecommendations();
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderItinerary();
            renderRecommendations();
            renderPersonsList();
            updateExpenseSummary();
        });
    </script>
</body>
</html>
